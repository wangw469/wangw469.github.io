---
layout: default
---
<style>
.song-link {
  background: #f8f9fa;
  border: 1px solid #e9ecef;
  border-radius: 8px;
  padding: 12px 16px;
  margin: 16px 0;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
}

.song-info {
  font-weight: 600;
  color: #333;
  font-size: 1.1em;
}

.song-services {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.song-services a {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 0.85em;
  color: #555;
  text-decoration: none;
  transition: all 0.2s ease;
}

.song-services a:hover {
  background: #333;
  color: #fff;
  border-color: #333;
}

@media (max-width: 600px) {
  .song-link {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
<header id="title-block-header">
<h1 class="title">{{ page.title }}</h1>
<p class="date">{{ page.date | date: "%Y-%m-%d" }} {{ page.city }}</p>
</header>
{{ content }}
